{% extends "base.html" %}
{% block title %}Login — WA Assistant{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-8">
    <div class="bg-white rounded-2xl shadow-md w-full max-w-md p-8">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-14 h-14 bg-green-500 rounded-full flex items-center justify-center mb-3">
                <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                    <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.121 1.532 5.849L0 24l6.335-1.51A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.6a9.6 9.6 0 110-19.2 9.6 9.6 0 010 19.2z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Welcome back</h1>
            <p class="text-gray-400 text-sm mt-1">Login to your WA Assistant account</p>
        </div>

        <!-- Error Message -->
        <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-4"></div>

        <!-- Form -->
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email or Phone Number</label>
                <input type="text" id="identifier" placeholder="john@example.com or 987..."
                    class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="••••••••"
                    class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400" />
            </div>

            <button type="submit"
                class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2.5 rounded-lg transition text-sm flex items-center justify-center gap-2">
                <span id="btn-text">Login</span>
                <svg id="spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                </svg>
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
            Don't have an account?
            <a href="/auth/register/" class="text-green-600 font-medium hover:underline">Register</a>
        </p>

    </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();  // ← this MUST be first, stops page reload

    const identifier = document.getElementById('identifier').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');

    // Reset UI
    errorMsg.classList.add('hidden');
    errorMsg.textContent = '';
    spinner.classList.remove('hidden');
    btnText.textContent = 'Logging in...';

    try {
        // Use plain fetch here — NOT apiFetch
        // apiFetch would try to refresh token on 401 which causes the redirect
        const res = await fetch('/api/auth/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ identifier, password }),
        });

        const data = await res.json();

        if (res.ok) {
            // Store tokens and redirect on success
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('refresh_token', data.refresh);
            localStorage.setItem('user_name', data.name);
            localStorage.setItem('business_name', data.business);
            window.location.href = '/dashboard/';
        } else {
            // Show error, do NOT redirect
            errorMsg.textContent = data.error || 'Invalid credentials. Please try again.';
            errorMsg.classList.remove('hidden');
        }

    } catch (err) {
        errorMsg.textContent = 'Network error. Please check your connection.';
        errorMsg.classList.remove('hidden');
    } finally {
        // Always reset button state
        spinner.classList.add('hidden');
        btnText.textContent = 'Login';
    }
});
</script>
{% endblock %}
