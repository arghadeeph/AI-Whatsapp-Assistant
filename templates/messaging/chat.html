{% extends "base.html" %}
{% block title %}Chat — WA Assistant{% endblock %}

{% block content %}

<div class="max-w-4xl mx-auto">

    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Chat</h1>
    </div>

    <div class="bg-white rounded-xl shadow-sm flex flex-col h-[600px]">

        <!-- Messages -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 bg-gray-50"></div>

        <!-- Input -->
        <div class="border-t p-4 flex gap-3">
            <input id="message-input" class="flex-1 border rounded-lg px-4 py-2 text-sm"
                   placeholder="Type message..." />
            <button onclick="sendMessage()"
                    class="bg-green-600 text-white px-4 py-2 rounded-lg">
                Send
            </button>
        </div>

    </div>

</div>

{% endblock %}

{% block extra_scripts %}

<script>
const signedPhone = "{{ signed_phone }}";

// Load messages
async function fetchMessages() {
    const res = await apiFetch(`/api/messages/chat/${signedPhone}/`);
    const data = await res.json();

    const chatBox = document.getElementById('chat-box');
    chatBox.innerHTML = '';

    data.messages.forEach(m => {
        const div = document.createElement('div');
        div.className = `flex ${m.direction === 'out' ? 'justify-end' : ''}`;

        div.innerHTML = `
            <div class="px-4 py-2 rounded-xl text-sm shadow 
                ${m.direction === 'out' ? 'bg-green-100' : 'bg-white'}">
                <p>${m.message}</p>
                <p class="text-xs text-gray-400 mt-1 text-right">${m.timestamp}</p>
            </div>
        `;

        chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
}

// Send message
async function sendMessage() {
    const input = document.getElementById('message-input');
    const text = input.value.trim();

    if (!text) return;

    await apiFetch('/api/messages/send-message/', {
        method: 'POST',
        body: JSON.stringify({
            phone: signedPhone,
            message: text
        })
    });

    input.value = '';
    fetchMessages();
}

// Enter to send
document.getElementById("message-input")
    .addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });

// Poll
setInterval(fetchMessages, 3000);
fetchMessages();
</script>

{% endblock %}
