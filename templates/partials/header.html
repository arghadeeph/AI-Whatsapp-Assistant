<header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">

        <!-- Logo -->
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                    <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.121 1.532 5.849L0 24l6.335-1.51A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.6a9.6 9.6 0 110-19.2 9.6 9.6 0 010 19.2z"/>
                </svg>
            </div>
            <span class="font-bold text-gray-800 text-lg">WA Assistant</span>
        </div>

        <!-- Nav -->
        <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-gray-600">
            <a href="/dashboard/" class="hover:text-green-600 transition">Dashboard</a>
            <a href="/chat/" class="hover:text-green-600 transition">Chat</a>
            <a href="/leads/" class="hover:text-green-600 transition">Leads</a>
            <a href="/campaigns/" class="hover:text-green-600 transition">Campaigns</a>
        </nav>

        <!-- User -->
        <div class="flex items-center gap-2 md:gap-3">
            <div class="relative">
                <button id="settings-toggle"
                    type="button"
                    class="inline-flex items-center gap-2 rounded-xl border border-gray-200 bg-white px-3 py-2 text-sm font-medium text-gray-700 hover:border-green-300 hover:text-green-700 transition">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.591 1.05c1.527-.938 3.31.845 2.372 2.372a1.724 1.724 0 001.05 2.591c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.05 2.591c.938 1.527-.845 3.31-2.372 2.372a1.724 1.724 0 00-2.591 1.05c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.591-1.05c-1.527.938-3.31-.845-2.372-2.372a1.724 1.724 0 00-1.05-2.591c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.05-2.591c-.938-1.527.845-3.31 2.372-2.372.95.588 2.18.094 2.591-1.05z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="hidden sm:inline">Settings</span>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m19 9-7 7-7-7" />
                    </svg>
                </button>

                <div id="settings-menu"
                    class="absolute right-0 mt-2 w-44 rounded-xl border border-gray-100 bg-white shadow-lg overflow-hidden hidden">
                    <a href="/business/faq"
                       class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-green-700 transition">
                        <span class="text-base"></span>
                        <span>FAQ</span>
                    </a>
                    <a href="/business/documents"
                       class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 hover:text-green-700 transition">
                        <span class="text-base"></span>
                        <span>Documents</span>
                    </a>
                </div>
            </div>

            <div id="user-avatar"
                class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center text-green-700 font-semibold text-sm">
                ?
            </div>
            <div id="user-name" class="hidden md:block text-sm text-gray-700"></div>
            <button onclick="logout()"
                class="text-sm text-red-500 hover:text-red-700 transition font-medium">
                Logout
            </button>
        </div>

    </div>
</header>

<script>
    // Populate header from localStorage
    const name = localStorage.getItem('user_name') || '';
    const business = localStorage.getItem('business_name') || '';
    const initials = name.split(' ').map(n => n[0]).join('').toUpperCase();

    document.getElementById('user-avatar').textContent = initials || '?';
    document.getElementById('user-name').textContent = name;

    const settingsToggle = document.getElementById('settings-toggle');
    const settingsMenu = document.getElementById('settings-menu');

    settingsToggle?.addEventListener('click', (event) => {
        event.stopPropagation();
        settingsMenu.classList.toggle('hidden');
    });

    document.addEventListener('click', () => {
        settingsMenu.classList.add('hidden');
    });
</script>
