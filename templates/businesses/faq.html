{% extends "base.html" %}

{% block title %}FAQs — WA Assistant{% endblock %}

{% block content %}

<!-- Page Header -->
<div class="flex items-center justify-between mb-8">
    <div>
        <h1 class="text-2xl font-bold text-gray-800">FAQs</h1>
        <p class="text-gray-500 mt-1">Manage frequently asked questions for your business.</p>
    </div>
    <button id="createFaqBtn"
        class="bg-green-600 text-white px-4 py-2 rounded-lg shadow hover:bg-green-700 transition">
        + Create New
    </button>
</div>

<!-- FAQ List -->
<div class="bg-white rounded-xl shadow-sm overflow-hidden">
    <table class="min-w-full text-sm text-left">
        <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
            <tr>
                <th class="px-6 py-3">Question</th>
                <th class="px-6 py-3">Answer</th>
                <th class="px-6 py-3 text-center">Status</th>
                <th class="px-6 py-3 text-right">Actions</th>
            </tr>
        </thead>
        <tbody id="faqTableBody" class="divide-y divide-gray-100">
            <!-- Dynamic content -->
        </tbody>
    </table>
</div>

<!-- FAQ Modal -->
<div id="faqModal"
    class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-lg p-6 relative">
        <h2 id="modalTitle" class="text-lg font-semibold text-gray-800 mb-4">Create FAQ</h2>

        <form id="faqForm" class="space-y-4">
            <input type="hidden" id="faqId">

            <div>
                <label class="block text-sm text-gray-600 mb-1">Question</label>
                <input type="text" id="faqQuestion"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500"
                    required>
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-1">Answer</label>
                <textarea id="faqAnswer" rows="4"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500"
                    required></textarea>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="faqActive"
                    class="h-4 w-4 text-green-600 border-gray-300 rounded">
                <label for="faqActive" class="ml-2 text-sm text-gray-600">Active</label>
            </div>

            <div class="flex justify-end gap-3 pt-4">
                <button type="button" id="closeModalBtn"
                    class="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-100">
                    Cancel
                </button>
                <button type="submit"
                    class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-700">
                    Save
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const faqTableBody = document.getElementById('faqTableBody');
    const faqModal = document.getElementById('faqModal');
    const faqForm = document.getElementById('faqForm');
    const modalTitle = document.getElementById('modalTitle');

    const faqId = document.getElementById('faqId');
    const faqQuestion = document.getElementById('faqQuestion');
    const faqAnswer = document.getElementById('faqAnswer');
    const faqActive = document.getElementById('faqActive');

    // Open modal for creating FAQ
    document.getElementById('createFaqBtn').addEventListener('click', () => {
        modalTitle.textContent = 'Create FAQ';
        faqForm.reset();
        faqId.value = '';
        faqModal.classList.remove('hidden');
        faqModal.classList.add('flex');
    });

    // Close modal
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        faqModal.classList.add('hidden');
        faqModal.classList.remove('flex');
    });

    // Fetch FAQs
    async function fetchFaqs() {
        try {
            const res = await apiFetch('/api/business/faq/');
            if (!res.ok) return;
            const data = await res.json();

            faqTableBody.innerHTML = '';

            data.forEach(faq => {
                faqTableBody.innerHTML += `
                    <tr>
                        <td class="px-6 py-4 font-medium text-gray-800">${faq.question}</td>
                        <td class="px-6 py-4 text-gray-600">${faq.answer}</td>
                        <td class="px-6 py-4 text-center">
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input 
                                    type="checkbox" 
                                    class="sr-only peer"
                                    ${faq.is_active ? 'checked' : ''}
                                    onchange="toggleStatus(${faq.id}, this.checked)"
                                >
                                <div class="w-11 h-6 bg-gray-200 rounded-full 
                                            peer-checked:bg-green-600
                                            transition-colors duration-300"></div>
                                <span class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow
                                            transform transition-transform duration-300
                                            peer-checked:translate-x-5"></span>
                            </label>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick='editFaq(${JSON.stringify(faq)})'
                                class="text-blue-600 hover:underline">
                                Edit
                            </button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error('Error fetching FAQs:', error);
        }
    }

    // Save FAQ (Create or Update)
    faqForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const payload = {
            question: faqQuestion.value,
            answer: faqAnswer.value,
            is_active: faqActive.checked
        };

        const id = faqId.value;
        const url = id ? `/api/business/faq/${id}/` : '/api/business/faq/';
        const method = id ? 'PUT' : 'POST';

        const res = await apiFetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            faqModal.classList.add('hidden');
            fetchFaqs();
        }
    });

    // Edit FAQ
    window.editFaq = function (faq) {
        modalTitle.textContent = 'Edit FAQ';
        faqId.value = faq.id;
        faqQuestion.value = faq.question;
        faqAnswer.value = faq.answer;
        faqActive.checked = faq.is_active;

        faqModal.classList.remove('hidden');
        faqModal.classList.add('flex');
    };

    // Toggle FAQ Status
    window.toggleStatus = async function (id, status) {
        await apiFetch(`/api/business/faq/${id}/toggle/`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ is_active: status })
        });
    };

    // Initial Load
    fetchFaqs();
});
</script>

{% endblock %}
